<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mailbox</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    .month-menu {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      width: min(520px, 92vw);
      margin: 24px auto 0;
    }

    .month-card {
      border: 0;
      border-radius: 18px;
      padding: 22px 16px;
      background: rgba(255, 250, 244, 0.92);
      box-shadow: 0 8px 18px rgba(80, 50, 30, 0.14);
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .month-card:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 22px rgba(80, 50, 30, 0.18);
    }

    .month-name {
      display: block;
      font-size: 1.05rem;
      font-weight: 700;
      text-transform: lowercase;
    }

    .month-subtitle {
      display: block;
      margin-top: 6px;
      font-size: 0.78rem;
      opacity: 0.72;
      text-transform: lowercase;
    }

    .month-section {
      width: min(620px, 94vw);
      margin: 18px auto 0;
    }

    .month-header {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      position: relative;
      margin-bottom: 18px;
    }

    .month-heading-text {
      text-align: center;
    }

    .month-heading-text h3 {
      margin: 0;
      font-size: 1.55rem;
      text-transform: lowercase;
    }

    .section-subtitle {
      margin-top: 4px;
      font-size: 0.95rem;
      opacity: 0.75;
      text-transform: lowercase;
    }

    .back-btn {
      position: absolute;
      left: 0;
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 250, 244, 0.92);
      box-shadow: 0 4px 10px rgba(80, 50, 30, 0.12);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .month-menu {
        grid-template-columns: 1fr;
      }

      .month-header {
        padding-top: 42px;
      }

      .back-btn {
        top: 0;
      }
    }
  </style>
</head>

<body class="mailbox-page">
  <h2>for my love 💌</h2>

  <!-- 🎵 BACKGROUND MUSIC -->
  <audio id="bgm" src="audio/menu.mp3" loop preload="auto"></audio>

  <!-- 🎚️ MUSIC UI (top-right) -->
  <div class="music-ui">
    <button id="musicToggle" class="music-btn" type="button">🔇</button>
    <input id="musicVolume" class="music-vol" type="range" min="0" max="1" step="0.01" value="0.35" />
  </div>

  <!-- MONTH MENU -->
<div class="month-menu" id="monthMenu">
  <button class="month-card" type="button" data-month="february">
    <span class="month-name">february</span>
  </button>

  <button class="month-card" type="button" data-month="march">
    <span class="month-name">march</span>
  </button>

  <button class="month-card" type="button" data-month="april">
    <span class="month-name">april</span>
    <span class="month-subtitle">heavenly bodies.</span>
  </button>

  <button class="month-card" type="button" data-month="may">
    <span class="month-name">may</span>
    <span class="month-subtitle">meaningful petals.</span>
  </button>

  <button class="month-card" type="button" data-month="june">
    <span class="month-name">june</span>
    <span class="month-subtitle">little eternities.</span>
  </button>

  <button class="month-card" type="button" data-month="july">
  <span class="month-name">july</span>
  <span class="month-subtitle">painted scenery.</span>
</button>
  
</div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal stationery" id="letterModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" type="button">✕</button>

      <h3 id="modalTitle"></h3>
      <p id="modalBody"></p>

      <!-- ✅ VOICE UI (shows only if letter has data-audio) -->
      <div class="voice-row" id="voiceRow" style="display:none; margin-top:16px;">
        <button id="playVoiceBtn" type="button">▶️ Play voice message</button>
      </div>

      <!-- ✅ Voice audio element -->
      <audio id="voiceAudio" preload="metadata"></audio>
    </div>
  </div>

  <script>
    // ===== MODAL =====
    const overlay = document.getElementById("modalOverlay");
    const closeBtn = document.getElementById("modalClose");
    const titleEl = document.getElementById("modalTitle");
    const bodyEl = document.getElementById("modalBody");
    const modalEl = document.getElementById("letterModal");

    // voice bits
    const voiceRow = document.getElementById("voiceRow");
    const playVoiceBtn = document.getElementById("playVoiceBtn");
    const voiceAudio = document.getElementById("voiceAudio");
    let currentVoiceFile = null;

    function openModal(title, body, paper, audioFile) {
      titleEl.textContent = title;
      bodyEl.textContent = body;
      modalEl.style.backgroundImage = `url("images/stationery/${paper}")`;

      // voice setup
      currentVoiceFile = audioFile || null;
      voiceAudio.pause();
      voiceAudio.currentTime = 0;

      if (currentVoiceFile) {
        voiceRow.style.display = "block";
        voiceAudio.src = `audio/letter/${currentVoiceFile}`;
      } else {
        voiceRow.style.display = "none";
        voiceAudio.removeAttribute("src");
      }

      overlay.classList.add("show");
      overlay.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      // stop voice when closing
      voiceAudio.pause();
      voiceAudio.currentTime = 0;

      overlay.classList.remove("show");
      overlay.setAttribute("aria-hidden", "true");
    }



    // ===== MONTH MENU =====
    const monthMenu = document.getElementById("monthMenu");
    const monthButtons = document.querySelectorAll(".month-card");
    const monthSections = document.querySelectorAll(".month-section");
    const backButtons = document.querySelectorAll(".back-btn");

    function showMonth(monthId) {
      monthMenu.classList.add("hidden");

      monthSections.forEach((section) => {
        section.classList.add("hidden");
      });

      document.getElementById(monthId).classList.remove("hidden");
    }

    function showMonthMenu() {
      monthMenu.classList.remove("hidden");

      monthSections.forEach((section) => {
        section.classList.add("hidden");
      });
    }

    monthButtons.forEach((button) => {
      button.addEventListener("click", () => {
        showMonth(button.dataset.month);
      });
    });

    backButtons.forEach((button) => {
      button.addEventListener("click", showMonthMenu);
    });

    // ===== DATE LOCKING =====
    function parseDMY(dmy) {
      const [dd, mm, yyyy] = dmy.split("/").map(Number);
      return new Date(yyyy, mm - 1, dd);
    }

    function todayStart() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    const today = todayStart();

    document.querySelectorAll(".letter-card").forEach((card) => {
      const unlockDate = parseDMY(card.dataset.title);

      if (unlockDate > today) {
        card.classList.add("locked");
        card.disabled = true;
        return;
      }

      card.addEventListener("click", () => {
        openModal(
          card.dataset.title,
          card.dataset.body,
          card.dataset.paper,
          card.dataset.audio // ✅ pass voice file if present
        );
      });
    });

    // ===== FAVOURITES / STARRED LETTERS =====
const FAVOURITES_KEY = "mailbox_favourites_v1";

function loadFavourites() {
  try {
    return JSON.parse(localStorage.getItem(FAVOURITES_KEY)) || [];
  } catch (_) {
    return [];
  }
}

function saveFavourites(favourites) {
  localStorage.setItem(FAVOURITES_KEY, JSON.stringify(favourites));
}

function getLetterId(card) {
  const monthSection = card.closest(".month-section");
  const monthId = monthSection ? monthSection.id : "unknown-month";

  return `${monthId}-${card.dataset.title}`;
}

function setupFavourites() {
  const favourites = loadFavourites();

  document.querySelectorAll(".letter-card:not(.locked)").forEach((card) => {
    const letterId = getLetterId(card);

    const star = document.createElement("span");
    star.className = "favourite-star";
    star.textContent = favourites.includes(letterId) ? "★" : "☆";

    if (favourites.includes(letterId)) {
      card.classList.add("favourited");
    }

    star.addEventListener("click", (event) => {
      event.stopPropagation();
      event.preventDefault();

      const index = favourites.indexOf(letterId);

      if (index === -1) {
        favourites.push(letterId);
        card.classList.add("favourited");
        star.textContent = "★";
      } else {
        favourites.splice(index, 1);
        card.classList.remove("favourited");
        star.textContent = "☆";
      }

      saveFavourites(favourites);
    });

    card.appendChild(star);
  });
}

setupFavourites();

    closeBtn.addEventListener("click", closeModal);

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    // ===== 🎵 BACKGROUND MUSIC CONTROL =====
    const bgm = document.getElementById("bgm");
    const musicToggle = document.getElementById("musicToggle");
    const musicVolume = document.getElementById("musicVolume");

    const savedOn = localStorage.getItem("bgm_on");
    const savedVol = localStorage.getItem("bgm_vol");

    const startOn = savedOn === "1";
    const startVol = savedVol ? parseFloat(savedVol) : 0.35;

    bgm.volume = 0;
    musicVolume.value = startVol;

    function setMusicIcon() {
      musicToggle.textContent = bgm.paused ? "🔇" : "🔊";
    }

    function fadeIn(targetVolume = startVol) {
      let v = 0;
      bgm.volume = 0;
      const step = targetVolume / 20;

      const fade = setInterval(() => {
        v += step;
        if (v >= targetVolume) {
          bgm.volume = targetVolume;
          clearInterval(fade);
        } else {
          bgm.volume = v;
        }
      }, 80);
    }

    function fadeOut() {
      let v = bgm.volume;
      const step = v / 20;

      const fade = setInterval(() => {
        v -= step;
        if (v <= 0) {
          bgm.volume = 0;
          bgm.pause();
          clearInterval(fade);
        } else {
          bgm.volume = v;
        }
      }, 80);
    }

    async function turnMusicOn() {
      try { await bgm.play(); } catch (_) {}
      fadeIn();
      localStorage.setItem("bgm_on", "1");
      setMusicIcon();
    }

    function turnMusicOff() {
      fadeOut();
      localStorage.setItem("bgm_on", "0");
      setMusicIcon();
    }

    setMusicIcon();

    if (startOn) {
      turnMusicOn();
    }

    musicToggle.addEventListener("click", () => {
      if (bgm.paused) {
        turnMusicOn();
      } else {
        turnMusicOff();
      }
    });

    musicVolume.addEventListener("input", () => {
      const v = parseFloat(musicVolume.value);
      bgm.volume = v;
      localStorage.setItem("bgm_vol", String(v));
    });

    // ===== 🎙️ VOICE: pause music while voice plays, resume after =====
    let resumeBgmAfterVoice = false;

    playVoiceBtn.addEventListener("click", async () => {
      if (!currentVoiceFile) return;

      // remember whether bgm was playing
      resumeBgmAfterVoice = !bgm.paused;

      // stop bgm fully while voice plays
      if (!bgm.paused) bgm.pause();

      try {
        await voiceAudio.play(); // must be user click
      } catch (e) {
        console.log("Voice play failed:", e);
        alert("Voice message couldn't play. Check file name/path (audio/letter/...).");
      }
    });

    voiceAudio.addEventListener("ended", async () => {
      // resume bgm only if user had it ON
      if (resumeBgmAfterVoice && localStorage.getItem("bgm_on") === "1") {
        try { await bgm.play(); } catch (_) {}
        fadeIn(parseFloat(musicVolume.value || startVol));
      }
      resumeBgmAfterVoice = false;
    });
  </script>
